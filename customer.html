<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Store</title>
    <link rel="stylesheet" href="customer.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <span onclick="loadAllProducts()">Home</span>
            <span>Contact</span>
            <input type="text" id="search-input" class="search-bar" placeholder="Search products..." onkeyup="handleSearch(event)">
        </div>
        <div class="nav-center">
            <h1 onclick="loadAllProducts()">G U C C I</h1>
        </div>
        <div class="nav-right">
            <span id="nav-user-greet" class="hidden">Hello, <b id="user-name-display"></b></span>
            <span id="nav-login" onclick="toggleAuthModal('login')">Login</span>
            <span id="nav-signup" onclick="toggleAuthModal('signup')">Sign Up</span>
            <span id="nav-logout" class="hidden" onclick="logout()">Logout</span>
            <span onclick="openCartModal()">👜 Cart (<b id="cart-count">0</b>)</span>
        </div>
    </header>

    <main id="main-content">
        <h2 id="explore-title" style="text-align:center; font-weight:400; margin-bottom: 20px;">Explore Categories</h2>
        <div id="category-slider" class="category-slider-container">
            </div>

        <div id="product-view">
            <h2 id="view-title" style="text-align: center; margin-bottom: 40px; font-weight: 400;">All Products</h2>
            <div id="product-grid" class="grid-container">
                </div>
        </div>
    </main>

    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleAuthModal()">&times;</span>
            <h2 id="auth-title">Login</h2>
            <input type="text" id="auth-name" placeholder="Full Name" class="hidden">
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password">
            <button class="submit-btn" onclick="submitAuth()">Submit</button>
        </div>
    </div>

    <div id="cart-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCartModal()">&times;</span>
            <h2>Your Shopping Cart</h2>
            <div id="cart-items" class="cart-items-container">
                </div>
            <h3 style="text-align:right; margin-bottom: 15px;">Total: $<span id="cart-total">0.00</span></h3>
            <button class="submit-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <script src="customer.js"></script>
</body>
</html>
